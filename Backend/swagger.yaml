openapi: 3.0.3
info:
  title: ReservAqui API
  description: |
    API REST do sistema ReservAqui — plataforma de reservas de hotéis.

    ## Autenticação
    A API utiliza **JWT Bearer Token**. Existem dois tipos de token:
    - **Token de Usuário** (`authGuard`): obtido via `POST /api/usuarios/login`
    - **Token de Hotel** (`hotelGuard`): obtido via `POST /api/hotel/login`

    Passe o token no header: `Authorization: Bearer <token>`
  version: 1.0.0
  contact:
    name: ReservAqui

servers:
  - url: http://localhost:3000/api
    description: Desenvolvimento local

tags:
  - name: Usuário — Auth
    description: Registro, login e gerenciamento de conta do hóspede
  - name: Usuário — Perfil
    description: Dados do perfil do hóspede autenticado
  - name: Usuário — Favoritos
    description: Hotéis favoritados pelo hóspede
  - name: Usuário — Reservas
    description: Reservas feitas pelo hóspede
  - name: Usuário — Avaliações
    description: Avaliações submetidas pelo hóspede
  - name: Hotel — Auth
    description: Registro, login e gerenciamento de conta do hotel
  - name: Hotel — Perfil
    description: Dados do perfil do hotel autenticado
  - name: Hotel — Reservas
    description: Gerenciamento de reservas pelo hotel
  - name: Hotel — Quartos
    description: Gerenciamento de quartos do hotel
  - name: Hotel — Categorias de Quarto
    description: Categorias/tipos de quarto e seus itens
  - name: Hotel — Catálogo
    description: Catálogo de comodidades e cômodos
  - name: Hotel — Configuração
    description: Configurações operacionais do hotel
  - name: Hotel — Notificações
    description: Notificações internas do hotel
  - name: Hotel — Saldo
    description: Saldo e saques do hotel
  - name: Pagamentos
    description: Criação de pagamentos e webhook InfinitePay
  - name: Uploads
    description: Fotos de capa do hotel e fotos de quartos
  - name: Dispositivos FCM
    description: Registro de tokens de push notification
  - name: Avaliações Públicas
    description: Leitura pública de avaliações de um hotel
  - name: Reservas Públicas
    description: Consulta pública de uma reserva por código
  - name: Busca de Quartos
    description: Busca pública cross-tenant de quartos por hotel, cidade ou estado

# ─────────────────────────────────────────────
# SECURITY SCHEMES
# ─────────────────────────────────────────────
components:
  securitySchemes:
    UserBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT gerado no login do **hóspede**
    HotelBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT gerado no login do **hotel**

  # ─────────────────────────────────────────────
  # SCHEMAS
  # ─────────────────────────────────────────────
  schemas:

    # ── Generic ──────────────────────────────
    Error:
      type: object
      properties:
        error:
          type: string
          example: Mensagem de erro descritiva

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    Tokens:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT de acesso (curta duração)
        refreshToken:
          type: string
          description: Token de renovação (longa duração)

    # ── Usuario ───────────────────────────────
    UsuarioPublico:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        nome_completo:
          type: string
        email:
          type: string
          format: email
        cpf:
          type: string
          example: "12345678901"
        data_nascimento:
          type: string
          example: "01/01/1990"
        numero_celular:
          type: string
          nullable: true
          example: "(11) 99999-9999"
        ativo:
          type: boolean
        criado_em:
          type: string
          format: date-time

    UsuarioRegisterRequest:
      type: object
      required: [nome_completo, email, senha, cpf, data_nascimento]
      properties:
        nome_completo:
          type: string
        email:
          type: string
          format: email
        senha:
          type: string
          description: "Deve conter maiúscula, minúscula, número e @"
          example: "Senha@123"
        cpf:
          type: string
          pattern: "^\\d{11}$"
          example: "12345678901"
        data_nascimento:
          type: string
          pattern: "^\\d{2}/\\d{2}/\\d{4}$"
          example: "15/06/1995"
        numero_celular:
          type: string
          nullable: true
          example: "(11) 98765-4321"

    UsuarioUpdateRequest:
      type: object
      properties:
        nome_completo:
          type: string
        email:
          type: string
          format: email
        numero_celular:
          type: string
          nullable: true
        data_nascimento:
          type: string

    # ── Hotel ─────────────────────────────────
    HotelPublico:
      type: object
      properties:
        hotel_id:
          type: string
          format: uuid
        nome_hotel:
          type: string
        cnpj:
          type: string
          example: "12345678000195"
        telefone:
          type: string
        email:
          type: string
          format: email
        cep:
          type: string
        uf:
          type: string
          example: "SP"
        cidade:
          type: string
        bairro:
          type: string
        rua:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true
        descricao:
          type: string
          nullable: true
        ativo:
          type: boolean
        criado_em:
          type: string
          format: date-time

    HotelRegisterRequest:
      type: object
      required:
        [nome_hotel, cnpj, telefone, email, senha, cep, uf, cidade, bairro, rua, numero]
      properties:
        nome_hotel:
          type: string
        cnpj:
          type: string
          pattern: "^\\d{14}$"
          example: "12345678000195"
        telefone:
          type: string
        email:
          type: string
          format: email
        senha:
          type: string
          example: "Senha@123"
        cep:
          type: string
          pattern: "^\\d{8}$"
          example: "01310100"
        uf:
          type: string
          pattern: "^[A-Z]{2}$"
          example: "SP"
        cidade:
          type: string
        bairro:
          type: string
        rua:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true
        descricao:
          type: string
          nullable: true

    HotelUpdateRequest:
      type: object
      properties:
        nome_hotel:
          type: string
        telefone:
          type: string
        descricao:
          type: string
          nullable: true
        cep:
          type: string
        uf:
          type: string
        cidade:
          type: string
        bairro:
          type: string
        rua:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true

    # ── Favorito ──────────────────────────────
    Favorito:
      type: object
      properties:
        hotel_id:
          type: string
          format: uuid
        nome_hotel:
          type: string
        cidade:
          type: string
        uf:
          type: string
        bairro:
          type: string
        descricao:
          type: string
          nullable: true
        cover_storage_path:
          type: string
          nullable: true
        favoritado_em:
          type: string
          format: date-time

    # ── Reserva ───────────────────────────────
    ReservaStatus:
      type: string
      enum:
        [SOLICITADA, AGUARDANDO_PAGAMENTO, APROVADA, CANCELADA, CONCLUIDA]

    Reserva:
      type: object
      properties:
        id:
          type: integer
        codigo_publico:
          type: string
          format: uuid
        hotel_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        nome_hospede:
          type: string
          nullable: true
        cpf_hospede:
          type: string
          nullable: true
        telefone_contato:
          type: string
          nullable: true
        quarto_id:
          type: integer
          nullable: true
        tipo_quarto:
          type: string
          nullable: true
        num_hospedes:
          type: integer
        data_checkin:
          type: string
          format: date
        data_checkout:
          type: string
          format: date
        valor_total:
          type: number
          format: decimal
        status:
          $ref: "#/components/schemas/ReservaStatus"
        observacoes:
          type: string
          nullable: true
        checkin_realizado_em:
          type: string
          format: date-time
          nullable: true
        checkout_realizado_em:
          type: string
          format: date-time
          nullable: true
        criado_em:
          type: string
          format: date-time

    HotelReservaCreateRequest:
      type: object
      required: [num_hospedes, data_checkin, data_checkout, valor_total]
      properties:
        num_hospedes:
          type: integer
          minimum: 1
        data_checkin:
          type: string
          format: date
        data_checkout:
          type: string
          format: date
        valor_total:
          type: number
          minimum: 0.01
        user_id:
          type: string
          format: uuid
          nullable: true
        nome_hospede:
          type: string
          nullable: true
        cpf_hospede:
          type: string
          nullable: true
        telefone_contato:
          type: string
          nullable: true
        quarto_id:
          type: integer
          nullable: true
        tipo_quarto:
          type: string
          nullable: true
        observacoes:
          type: string
          nullable: true

    UserReservaCreateRequest:
      type: object
      required: [hotel_id, num_hospedes, data_checkin, data_checkout, valor_total]
      properties:
        hotel_id:
          type: string
          format: uuid
        num_hospedes:
          type: integer
          minimum: 1
        data_checkin:
          type: string
          format: date
        data_checkout:
          type: string
          format: date
        valor_total:
          type: number
          minimum: 0.01
        quarto_id:
          type: integer
          nullable: true
        tipo_quarto:
          type: string
          nullable: true
        observacoes:
          type: string
          nullable: true

    ReservaStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ReservaStatus"

    # ── Avaliação ──────────────────────────────
    NotaAvaliacao:
      type: integer
      minimum: 1
      maximum: 5

    Avaliacao:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: string
          format: uuid
        reserva_id:
          type: integer
        nota_limpeza:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_atendimento:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_conforto:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_organizacao:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_localizacao:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_total:
          type: number
          format: float
          description: Média das 5 notas
        comentario:
          type: string
          nullable: true
        criado_em:
          type: string
          format: date-time

    AvaliacaoCreateRequest:
      type: object
      required:
        [ codigo_publico, nota_limpeza, nota_atendimento, nota_conforto, nota_organizacao, nota_localizacao ]
      properties:
        codigo_publico:
          type: string
          format: uuid
        nota_limpeza:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_atendimento:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_conforto:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_organizacao:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_localizacao:
          $ref: "#/components/schemas/NotaAvaliacao"
        comentario:
          type: string
          nullable: true

    AvaliacaoUpdateRequest:
      type: object
      properties:
        nota_limpeza:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_atendimento:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_conforto:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_organizacao:
          $ref: "#/components/schemas/NotaAvaliacao"
        nota_localizacao:
          $ref: "#/components/schemas/NotaAvaliacao"
        comentario:
          type: string
          nullable: true

    # ── Catálogo ──────────────────────────────
    CatalogoCategoria:
      type: string
      enum: [COMODO, COMODIDADE, LAZER]

    CatalogoItem:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        categoria:
          $ref: "#/components/schemas/CatalogoCategoria"

    CatalogoCreateRequest:
      type: object
      required: [nome, categoria]
      properties:
        nome:
          type: string
          maxLength: 100
        categoria:
          $ref: "#/components/schemas/CatalogoCategoria"

    CatalogoUpdateRequest:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          maxLength: 100

    # ── Categoria de Quarto ────────────────────
    CategoriaQuartoItem:
      type: object
      properties:
        catalogo_id:
          type: integer
        nome:
          type: string
        categoria:
          $ref: "#/components/schemas/CatalogoCategoria"
        quantidade:
          type: integer

    CategoriaQuarto:
      type: object
      properties:
        id:
          type: integer
        hotel_id:
          type: string
          format: uuid
        nome:
          type: string
        valor_diaria:
          type: number
          format: decimal
        capacidade_pessoas:
          type: integer
        itens:
          type: array
          items:
            $ref: "#/components/schemas/CategoriaQuartoItem"

    CategoriaQuartoCreateRequest:
      type: object
      required: [nome, valor_diaria, capacidade_pessoas]
      properties:
        nome:
          type: string
          maxLength: 50
        valor_diaria:
          type: number
          minimum: 0.01
        capacidade_pessoas:
          type: integer
          minimum: 1

    CategoriaQuartoUpdateRequest:
      type: object
      properties:
        nome:
          type: string
          maxLength: 50
        valor_diaria:
          type: number
          minimum: 0.01
        capacidade_pessoas:
          type: integer
          minimum: 1

    CategoriaItemAddRequest:
      type: object
      required: [catalogo_id]
      properties:
        catalogo_id:
          type: integer

    # ── Quarto ────────────────────────────────
    QuartoItem:
      type: object
      properties:
        catalogo_id:
          type: integer
        quantidade:
          type: integer

    Quarto:
      type: object
      properties:
        id:
          type: integer
        hotel_id:
          type: string
          format: uuid
        numero:
          type: string
        categoria_quarto_id:
          type: integer
        descricao:
          type: string
          nullable: true
        valor_diaria:
          type: number
          format: decimal
          nullable: true
          description: Se nulo, usa o valor da categoria
        disponivel:
          type: boolean
        itens:
          type: array
          items:
            $ref: "#/components/schemas/QuartoItem"

    QuartoCreateRequest:
      type: object
      required: [numero, categoria_quarto_id]
      properties:
        numero:
          type: string
          maxLength: 10
        categoria_quarto_id:
          type: integer
          minimum: 1
        descricao:
          type: string
          nullable: true
          maxLength: 500
        valor_diaria:
          type: number
          nullable: true
          minimum: 0.01
        disponivel:
          type: boolean
          default: true
        itens:
          type: array
          items:
            $ref: "#/components/schemas/QuartoItem"

    SearchRoomResult:
      type: object
      properties:
        quarto_id:
          type: integer
          description: ID único do quarto
        hotel_id:
          type: string
          format: uuid
          description: ID do hotel
        numero:
          type: string
          description: Número ou identificação do quarto
        descricao:
          type: string
          nullable: true
          description: Descrição adicional do quarto
        valor_diaria:
          type: string
          description: Valor da diária em formato decimal do Postgres (requer parse cliente)
        itens:
          type: array
          description: Itens/comodidades do quarto
          items:
            $ref: "#/components/schemas/QuartoItem"
        nome_hotel:
          type: string
          description: Nome do hotel enriquecido na busca
        cidade:
          type: string
          description: Cidade do hotel
        uf:
          type: string
          maxLength: 2
          description: Unidade Federativa (estado) do hotel

    QuartoUpdateRequest:
      type: object
      properties:
        numero:
          type: string
          maxLength: 10
        categoria_quarto_id:
          type: integer
          minimum: 1
        descricao:
          type: string
          nullable: true
          maxLength: 500
        valor_diaria:
          type: number
          nullable: true
          minimum: 0.01
        disponivel:
          type: boolean
        itens:
          type: array
          items:
            $ref: "#/components/schemas/QuartoItem"

    # ── Configuração ──────────────────────────
    HotelConfiguracao:
      type: object
      properties:
        hotel_id:
          type: string
          format: uuid
        nome_hotel:
          type: string
        cnpj:
          type: string
        telefone:
          type: string
        email:
          type: string
          format: email
        cep:
          type: string
        uf:
          type: string
        cidade:
          type: string
        bairro:
          type: string
        rua:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true
        saldo:
          type: number
          format: decimal
        descricao:
          type: string
          nullable: true
        horario_checkin:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "14:00"
        horario_checkout:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "12:00"
        max_dias_reserva:
          type: integer
        politica_cancelamento:
          type: string
          nullable: true
        aceita_animais:
          type: boolean
        idiomas_atendimento:
          type: string

    HotelConfiguracaoRequest:
      type: object
      properties:
        horario_checkin:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "14:00"
        horario_checkout:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "12:00"
        max_dias_reserva:
          type: integer
          minimum: 1
        politica_cancelamento:
          type: string
          nullable: true
        aceita_animais:
          type: boolean
        idiomas_atendimento:
          type: string
          maxLength: 200

    # ── Notificação Hotel ──────────────────────
    NotificacaoHotel:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        mensagem:
          type: string
        lida:
          type: boolean
        criado_em:
          type: string
          format: date-time

    # ── Pagamento ─────────────────────────────
    PagamentoStatus:
      type: string
      enum: [PENDENTE, APROVADO, ESTORNADO]

    Pagamento:
      type: object
      properties:
        id:
          type: integer
        reserva_id:
          type: integer
        valor_pago:
          type: number
          format: decimal
        forma_pagamento:
          type: string
        status:
          $ref: "#/components/schemas/PagamentoStatus"
        checkout_url:
          type: string
          nullable: true
          description: Link de pagamento InfinitePay
        infinite_invoice_slug:
          type: string
          nullable: true
        transaction_nsu:
          type: string
          nullable: true
        metodo_captura:
          type: string
          nullable: true
        recibo_url:
          type: string
          nullable: true
        data_pagamento:
          type: string
          format: date-time

    InfinitePayWebhookRequest:
      type: object
      required:
        [invoice_slug, amount, paid_amount, capture_method, transaction_nsu, order_nsu]
      properties:
        invoice_slug:
          type: string
        amount:
          type: integer
          description: Valor em centavos
        paid_amount:
          type: integer
          description: Valor pago em centavos
        installments:
          type: integer
          default: 1
        capture_method:
          type: string
          enum: [credit_card, pix]
        transaction_nsu:
          type: string
        order_nsu:
          type: string
          description: Mapeado para o codigo_publico da reserva
        receipt_url:
          type: string
          nullable: true
        items:
          type: array
          items:
            type: object

    # ── Saldo ─────────────────────────────────
    Saldo:
      type: object
      properties:
        saldo_total:
          type: number
          format: decimal
        saldo_disponivel:
          type: number
          format: decimal
        ultimo_saque:
          type: string
          format: date-time
          nullable: true
        proxima_data_saque:
          type: string
          format: date-time
          nullable: true

    Saque:
      type: object
      properties:
        id:
          type: integer
        hotel_id:
          type: string
          format: uuid
        valor:
          type: number
          format: decimal
        status:
          type: string
        solicitado_em:
          type: string
          format: date-time
        data_transferencia:
          type: string
          format: date-time
          nullable: true

    # ── FCM ───────────────────────────────────
    FcmRegisterRequest:
      type: object
      required: [fcm_token]
      properties:
        fcm_token:
          type: string
        origem:
          type: string
          enum: [DASHBOARD_WEB, APP_IOS, APP_ANDROID]

    FcmRemoveRequest:
      type: object
      required: [fcm_token]
      properties:
        fcm_token:
          type: string

    # ── Upload ────────────────────────────────
    Foto:
      type: object
      properties:
        foto_id:
          type: string
          format: uuid
        storage_path:
          type: string
        orientacao:
          type: string
          enum: [portrait, landscape]
        criado_em:
          type: string
          format: date-time

    # ── Auth shared ───────────────────────────
    LoginRequest:
      type: object
      required: [email, senha]
      properties:
        email:
          type: string
          format: email
        senha:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ChangePasswordRequest:
      type: object
      required: [senhaAtual, novaSenha]
      properties:
        senhaAtual:
          type: string
        novaSenha:
          type: string

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ════════════════════════════════════════════
  # USUÁRIO — AUTH
  # ════════════════════════════════════════════
  /usuarios/register:
    post:
      tags: [Usuário — Auth]
      summary: Registrar hóspede
      requestBody:
        required: true
