      summary: Deletar foto de quarto
      security:
        - HotelBearer: []
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: quarto_id
          in: path
          required: true
          schema:
            type: integer
        - name: foto_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Foto deletada

  # ════════════════════════════════════════════
  # PÚBLICOS — Catálogo, Categorias, Disponibilidade, Configuração
  # ════════════════════════════════════════════
