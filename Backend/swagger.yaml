          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Foto"
        "422":
          description: Arquivo inválido

  /uploads/hotels/{hotel_id}/rooms/{quarto_id}/{foto_id}:
    get:
      tags: [Uploads]
      summary: Servir foto de quarto (arquivo)
      parameters:
