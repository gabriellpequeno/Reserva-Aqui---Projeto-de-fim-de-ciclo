  # AVALIAÇÕES PÚBLICAS
  # ════════════════════════════════════════════
  /hotel/{hotel_id}/avaliacoes:
    get:
      tags: [Avaliações Públicas]
      summary: Listar avaliações públicas de um hotel
      parameters:
        - name: hotel_id
          in: path
          required: true
