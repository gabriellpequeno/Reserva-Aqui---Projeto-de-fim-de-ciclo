  # ════════════════════════════════════════════
  # UPLOADS — FOTOS DE CAPA DO HOTEL
  # ════════════════════════════════════════════
  /uploads/hotels/{hotel_id}/cover:
    get:
      tags: [Uploads]
      summary: Listar fotos de capa de um hotel
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: orientacao
          in: query
          schema:
            type: string
            enum: [portrait, landscape]
      responses:
        "200":
          description: Lista de fotos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Foto"

    post:
      tags: [Uploads]
      summary: Enviar foto de capa do hotel
      security:
        - HotelBearer: []
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [foto, orientacao]
              properties:
                foto:
                  type: string
                  format: binary
                  description: Arquivo de imagem (JPEG, PNG ou WebP)
                orientacao:
                  type: string
                  enum: [portrait, landscape]
      responses:
        "201":
          description: Foto enviada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Foto"
        "422":
          description: Arquivo inválido (não é imagem ou formato não suportado)

  /uploads/hotels/{hotel_id}/cover/{foto_id}:
    get:
      tags: [Uploads]
      summary: Servir foto de capa (arquivo)
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: foto_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Arquivo de imagem
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary

    delete:
      tags: [Uploads]
      summary: Deletar foto de capa do hotel
      security:
        - HotelBearer: []
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: foto_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Foto deletada

